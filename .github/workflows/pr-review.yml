name: PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          gh pr diff ${{ github.event.pull_request.number }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Review PR with AI
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const diff = `${{ steps.diff.outputs.diff }}`;
            
            // 获取 PR 标题和描述
            const reviewBody = `## 🤖 AI Code Review
            
### PR 信息
- **标题**: ${pr.title}
- **作者**: ${pr.user.login}
- **分支**: ${pr.head.ref} → ${pr.base.ref}

### 审查要点
请检查以下内容：
1. 代码风格和最佳实践
2. 潜在的性能问题
3. 安全漏洞
4. 逻辑错误
5. 是否需要添加测试

### Diff 预览
\`\`\`diff
${diff.slice(0, 5000)}
\`\`\`
${diff.length > 5000 ? '...(diff 过长，已截断)' : ''}

---
*此 review 由 GitHub Actions 自动生成*`;
            
            // 提交 review
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: reviewBody,
              event: 'COMMENT'
            });
            
            console.log('Review submitted successfully');
